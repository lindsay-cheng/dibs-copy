# Your watchlist. Each entry is a company you want to hear about.
#   - A bare name           -> notify on ALL of that company's roles.
#   - name + roles: [...]    -> notify only when the title contains one of the
#                               keywords (case-insensitive).
# Matching is case-insensitive and fuzzy on punctuation/Inc/LLC/Corp, so
# "Jane Street" matches "Jane Street Capital". Don't know a company's exact
# name? Run `python companies.py` to print the real list.
companies:
  - Citadel
  - name: Jane Street
    roles: [software]
  - name: Anthropic
    roles: [engineer, research]
